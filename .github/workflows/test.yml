name: Unit Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # Dummy DATABASE_URL so Prisma client can be constructed.
  # Pure unit tests never actually connect.
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy_no_connect"
  BETTER_AUTH_SECRET: "test-secret-32-chars-minimum-here!!"

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm --filter @repo/database generate

      - name: Run unit tests
        run: pnpm test -- --reporter=verbose

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            packages/api/coverage/
            packages/database/coverage/
          retention-days: 14
          if-no-files-found: ignore
